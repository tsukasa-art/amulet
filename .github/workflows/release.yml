name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-musl
            artifact: amulet-linux-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-macos
            artifact: amulet-macos-aarch64
            ext: ""
          - os: macos-latest
            target: x86_64-macos
            artifact: amulet-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-windows
            artifact: amulet-windows-x86_64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dstrip=true -Dtarget=${{ matrix.target }} "-Dversion=${{ github.ref_name }}"

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp zig-out/bin/amulet ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp zig-out/bin/amulet.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: amulet-*
          generate_release_notes: true
